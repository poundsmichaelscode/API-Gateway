worker_processes auto;

events { worker_connections 4096; }

http {
  server_tokens off;
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  gzip on;
  gzip_types application/json text/plain application/javascript text/css;

  limit_req_zone $binary_remote_addr zone=public_limit:10m rate=50r/s;

  upstream api_gateway_cluster {
    least_conn;
    server api-gateway:4000 max_fails=3 fail_timeout=10s;
    # Add more horizontally scaled gateway replicas here or use Docker/K8s service discovery.
  }

  server {
    listen 80;
    server_name _;

    location /health {
      proxy_pass http://api_gateway_cluster/health;
    }

    location / {
      limit_req zone=public_limit burst=100 nodelay;
      proxy_pass http://api_gateway_cluster;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_read_timeout 60s;
      proxy_connect_timeout 5s;
      proxy_send_timeout 60s;
    }
  }

  # Production SSL example. Mount certificates into /etc/nginx/certs.
  server {
    listen 443 ssl http2;
    server_name api.example.com;
    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
      proxy_pass http://api_gateway_cluster;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }
  }
}
